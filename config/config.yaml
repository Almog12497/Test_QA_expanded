testing:
  sampling:
    measurements_count: 10          # Used when total_duration_seconds is not set
    total_duration_seconds: null    # When set, overrides measurements_count (count = duration * frequency)
    sampling_frequency_hz: 1.0

ammeters:
  greenlee:
    port: 5001
    command: "MEASURE_GREENLEE -get_measurement"
  entes:
    port: 5002
    command: "MEASURE_ENTES -get_data"
  circutor:
    port: 5003
    command: "MEASURE_CIRCUTOR -get_measurement -current"

analysis:
  statistical_metrics:
    - mean
    - median
    - std_dev
    - min
    - max
  visualization:
    enabled: true

result_management:
  output_dir: "results"
